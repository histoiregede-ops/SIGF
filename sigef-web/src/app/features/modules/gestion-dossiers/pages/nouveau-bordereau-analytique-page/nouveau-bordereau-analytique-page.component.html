<div class="page-content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-12">
        <div class="page-title-box d-sm-flex align-items-center justify-content-between bg-galaxy-transparent">
          <h4 class="mb-sm-0">Nouveau Bordereau Analytique</h4>
          <div class="page-title-right">
            <ol class="breadcrumb m-0">
              <li class="breadcrumb-item"><a routerLink="/">Tableau de bord</a></li>
              <li class="breadcrumb-item"><a routerLink="/dossiers/bordereaux">Bordereaux</a></li>
              <li class="breadcrumb-item active">Nouveau</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-lg-12">
        <div class="card">
          <div class="card-header border-0">
            <h4 class="card-title mb-0">Informations du bordereau</h4>
          </div>
          <div class="card-body">
            <form [formGroup]="nouveauBordereauForm" (ngSubmit)="validerCreation()">
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="numero" class="form-label">N° de Bordereau <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="numero" formControlName="numero" placeholder="Ex: BA-2026-001">
                </div>
                <div class="col-md-6">
                  <label for="dateBordereau" class="form-label">Date du Bordereau <span class="text-danger">*</span></label>
                  <input type="date" class="form-control" id="dateBordereau" formControlName="dateBordereau">
                </div>
                <div class="col-md-6">
                  <label for="titreFoncierId" class="form-label">Titre Foncier <span class="text-danger">*</span></label>
                  <select class="form-select" id="titreFoncierId" formControlName="titreFoncierId">
                    <option [value]="null">Sélectionner un titre</option>
                    <option *ngFor="let tf of titresFonciers" [value]="tf.id">{{ tf.numero }}</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label for="requisitionId" class="form-label">Réquisition</label>
                  <select class="form-select" id="requisitionId" formControlName="requisitionId">
                    <option [value]="null">Sélectionner une réquisition (optionnel)</option>
                    <option *ngFor="let req of requisitions" [value]="req.id">{{ req.numero }}</option>
                  </select>
                </div>
                <div class="col-12">
                  <label for="description" class="form-label">Résumé des inscriptions</label>
                  <textarea class="form-control" id="description" formControlName="description" rows="5" placeholder="Saisir le résumé des droits réels..."></textarea>
                </div>
              </div>

              <div class="mt-4 hstack gap-2 justify-content-end">
                <button type="button" class="btn btn-light" (click)="annuler()">Annuler</button>
                <button type="submit" class="btn btn-primary" [disabled]="nouveauBordereauForm.invalid">Enregistrer</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
