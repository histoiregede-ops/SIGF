<div class="page-content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-12">
        <div class="page-title-box d-sm-flex align-items-center justify-content-between bg-galaxy-transparent">
          <h4 class="mb-sm-0">Nouvel Acte</h4>
          <div class="page-title-right">
            <ol class="breadcrumb m-0">
              <li class="breadcrumb-item"><a routerLink="/">Tableau de bord</a></li>
              <li class="breadcrumb-item"><a routerLink="/dossiers/actes">Actes</a></li>
              <li class="breadcrumb-item active">Nouveau</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-lg-12">
        <div class="card">
          <div class="card-header border-0">
            <h4 class="card-title mb-0">Informations de l'acte</h4>
          </div>
          <div class="card-body">
            <form [formGroup]="nouveauActeForm" (ngSubmit)="validerCreationActe()">
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="numeroOrdre" class="form-label">N° d'ordre <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="numeroOrdre" formControlName="numeroOrdre" placeholder="Ex: 123/2026">
                </div>
                <div class="col-md-6">
                  <label for="folio" class="form-label">Folio <span class="text-danger">*</span></label>
                  <input type="number" class="form-control" id="folio" formControlName="folio" placeholder="Ex: 45">
                </div>
                <div class="col-md-6">
                  <label for="regionId" class="form-label">Région <span class="text-danger">*</span></label>
                  <select class="form-select" id="regionId" formControlName="regionId">
                    <option [value]="null">Sélectionner une région</option>
                    <option *ngFor="let region of regions" [value]="region.id">{{ region.libelle }}</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label for="dossierRegistreId" class="form-label">Registre <span class="text-danger">*</span></label>
                  <select class="form-select" id="dossierRegistreId" formControlName="dossierRegistreId">
                    <option [value]="null">Sélectionner un registre</option>
                    <option *ngFor="let registre of dossiersRegistres" [value]="registre.id">{{ registre.nom }}</option>
                  </select>
                </div>
                <div class="col-12">
                  <label for="description" class="form-label">Description</label>
                  <textarea class="form-control" id="description" formControlName="description" rows="3" placeholder="Description de l'acte..."></textarea>
                </div>
              </div>

              <div class="mt-4 hstack gap-2 justify-content-end">
                <button type="button" class="btn btn-light" (click)="annuler()">Annuler</button>
                <button type="submit" class="btn btn-primary" [disabled]="nouveauActeForm.invalid">Enregistrer l'acte</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
