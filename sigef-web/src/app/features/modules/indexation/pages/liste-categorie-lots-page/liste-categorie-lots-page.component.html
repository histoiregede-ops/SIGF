<div class="page-content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-12">
        <div class="page-title-box d-sm-flex align-items-center justify-content-between bg-galaxy-transparent">
          <h4 class="mb-sm-0">Saisie des donnees (Indexeur)</h4>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-md-6 col-xl-2">
        <button class="btn btn-primary w-100 py-4" (click)="openSaisieType(typesRegistre.FORMALITES_PREALABLES)">
          <i class="ri-file-list-3-line fs-24 d-block mb-2"></i>
          Formalités préalables
        </button>
      </div>
      <div class="col-md-6 col-xl-2">
        <button class="btn btn-warning w-100 py-4" (click)="openSaisieType(typesRegistre.OPPOSITIONS)">
          <i class="ri-error-warning-line fs-24 d-block mb-2"></i>
          Oppositions
        </button>
      </div>
      <div class="col-md-6 col-xl-2">
        <button class="btn btn-info w-100 py-4" (click)="openSaisieType(typesRegistre.DEPOTS)">
          <i class="ri-folder-zip-line fs-24 d-block mb-2"></i>
          Dépôts
        </button>
      </div>
      <div class="col-md-6 col-xl-2">
        <button class="btn btn-success w-100 py-4" (click)="openSaisieType(typesRegistre.TITRES_FONCIERS)">
          <i class="ri-bank-card-line fs-24 d-block mb-2"></i>
          Titres fonciers
        </button>
      </div>
      <div class="col-md-6 col-xl-2">
        <button class="btn btn-danger w-100 py-4" (click)="openSaisieType(typesRegistre.ACTES)">
          <i class="ri-file-text-line fs-24 d-block mb-2"></i>
          Actes
        </button>
      </div>
    </div>
  </div>
</div>
