<div *ngIf="tacheIndexation && tacheIndexation.progressionsTacheIndexation" class="d-flex flex-column align-items-center pe-2">
    <div class="d-flex justify-content-between align-items-center w-100 mb-1">
        <div class="">{{ tacheIndexation.progressionsTacheIndexation.length }}</div>
        <div class="">{{ getProgressionsTacheIndexationPourcentage(tacheIndexation.progressionsTacheIndexation) | formatPourcentage }}</div>
    </div>
    <div class="w-100">
        <div class="progress progress-sm" style="width: 100%;">
            <div class="progress-bar bg-success rounded" role="progressbar" [style.width]="getProgressionsTacheIndexationPourcentage(tacheIndexation.progressionsTacheIndexation).toFixed(2) + '%'" [attr.aria-valuenow]="getProgressionsTacheIndexationPourcentage(tacheIndexation.progressionsTacheIndexation).toFixed(2)" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
    </div>
</div>
